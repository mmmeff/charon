# Release workflow: builds the macOS DMG and publishes it as a GitHub Release.
#
# Triggers:
#   - pushing a tag like v0.1.0 (the usual path: bump version, tag, push)
#   - manual run from the Actions tab (workflow_dispatch)
#
# The release is keyed to the app version in src-tauri/tauri.conf.json via
# tauri-action's v__VERSION__ template, so both triggers converge on the same
# release. The bundle is a universal binary (Apple Silicon + Intel) and is
# unsigned — see the release notes line about first launch.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so the changelog can diff against the previous tag

      - name: Build changelog
        id: changelog
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            CURRENT="$GITHUB_REF_NAME"
            PREV=$(git tag --sort=-version:refname | grep -vFx "$CURRENT" | head -1)
            TO="$CURRENT"
          else
            CURRENT="(unreleased)"
            PREV=$(git tag --sort=-version:refname | head -1)
            TO="HEAD"
          fi
          if [ -n "$PREV" ]; then
            HEADER="### Changes since ${PREV}"
            LOG=$(git log --no-merges --pretty=format:'- %s' "${PREV}..${TO}")
            COMPARE="**Full changelog:** https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${CURRENT}"
          else
            HEADER="### Changes"
            LOG=$(git log --no-merges --pretty=format:'- %s' "$TO")
            COMPARE=""
          fi
          [ -z "$LOG" ] && LOG="- No code changes."
          {
            echo "body<<__CHANGELOG_EOF__"
            echo "$HEADER"
            echo ""
            echo "$LOG"
            echo ""
            [ -n "$COMPARE" ] && { echo "$COMPARE"; echo ""; }
            echo "---"
            echo "macOS build (universal: Apple Silicon + Intel). Not code-signed — on first launch right-click the app → Open, or clear the quarantine flag: \`xattr -cr /Applications/Charon.app\`"
            echo "__CHANGELOG_EOF__"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - run: npm run typecheck

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Charon v__VERSION__"
          releaseBody: |
            macOS build (universal: Apple Silicon + Intel).

            The app is not code-signed. On first launch either right-click the
            app → Open, or clear the quarantine flag:
            `xattr -cr /Applications/Charon.app`
          releaseDraft: false
          args: --target universal-apple-darwin
