# Release workflow: builds the macOS DMG + signed updater artifacts and
# publishes them as a GitHub Release.
#
# Triggers:
#   - called by version.yml after it auto-bumps and tags a new version (the
#     normal path — every push to main flows through there)
#   - pushing a tag like v0.1.0 by hand
#   - manual run from the Actions tab (workflow_dispatch)
#
# The release is keyed to the app version in src-tauri/tauri.conf.json via
# tauri-action's v__VERSION__ template, so all triggers converge on the same
# release. The bundle is a universal binary (Apple Silicon + Intel),
# codesigned with the Developer ID Application cert (APPLE_CERTIFICATE) and
# notarized through APPLE_ID + APPLE_PASSWORD (app-specific password).
# Updater artifacts are additionally minisign-signed
# (TAURI_SIGNING_PRIVATE_KEY) and tauri-action uploads latest.json so
# installed apps self-update. Release notes are a changelog auto-built from
# the commits since the previous tag.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and release (e.g. v0.3.0); empty builds main"
        required: false
        type: string
  workflow_call:
    inputs:
      ref:
        description: "Git ref to build — commit SHA, branch, or tag"
        required: false
        type: string
      tag:
        description: "Intended release tag name (e.g. v1.6.4); tag created on success if not yet present"
        required: false
        type: string

permissions:
  contents: write

jobs:
  macos-dmg:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || inputs.tag || github.ref }}
          fetch-depth: 0 # full history + tags so the changelog can diff against the previous tag

      - name: Build changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          APP_VER=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CURRENT="v${APP_VER}"
          # Git ref containing the bumped version files (HEAD of checked-out tree)
          TO=HEAD
          # Latest released tag whose version is strictly less than current (works whether
          # CURRENT already exists as a tag or we're building an untagged bump commit).
          PREV=$(git tag --sort=-version:refname | while read -r t; do
            v="${t#v}"; IFS=. read -r a b c <<< "$v"
            cur_v="$APP_VER"; IFS=. read -r x y z <<< "$cur_v"
            less=0
            if [ "$a" -lt "$x" ]; then less=1
            elif [ "$a" = "$x" ] && [ "$b" -lt "$y" ]; then less=1
            elif [ "$a" = "$x" ] && [ "$b" = "$y" ] && [ "$c" -lt "$z" ]; then less=1; fi
            [ "$less" = 1 ] && echo "$t" && break
          done)
          if [ -n "$PREV" ]; then
            HEADER="### Changes since ${PREV}"
            LOG=$(git log --no-merges --pretty=format:'- %s' "${PREV}..${TO}")
            COMPARE="**Full changelog:** https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${CURRENT}"
          else
            HEADER="### Changes"
            LOG=$(git log --no-merges --pretty=format:'- %s' "$TO")
            COMPARE=""
          fi
          [ -z "$LOG" ] && LOG="- No code changes."
          {
            echo "body<<__CHANGELOG_EOF__"
            echo "$HEADER"
            echo ""
            echo "$LOG"
            echo ""
            [ -n "$COMPARE" ] && { echo "$COMPARE"; echo ""; }
            echo "---"
            echo "macOS build (universal: Apple Silicon + Intel), code-signed and notarized. The app self-updates from this release onward."
            echo "__CHANGELOG_EOF__"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - run: npm run typecheck

      # The bundler signs whenever APPLE_CERTIFICATE is *set* — even to "" —
      # and a missing repo secret expands to exactly that, killing the build
      # at `security import`. The secrets context isn't allowed in step-level
      # `if:` expressions (it breaks workflow parsing), so the guard lives in
      # the shell: the Apple env only reaches the build step when the secrets
      # are actually non-empty. Until then releases build unsigned.
      - name: Enable Apple code signing (when cert secret is configured)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE secret not set; building unsigned."
            exit 0
          fi
          {
            echo "APPLE_CERTIFICATE<<__APPLE_EOF__"
            echo "$APPLE_CERTIFICATE"
            echo "__APPLE_EOF__"
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
          } >> "$GITHUB_ENV"

      - name: Enable notarization (when Apple ID secrets are configured)
        # Temporarily disabled: Apple's notary API rejects the current APPLE_ID /
        # APPLE_PASSWORD ("failed to notarize app: Error: HTTP status code: …"),
        # which hard-fails the whole bundle step. Releases ship codesigned but
        # un-notarized until the app-specific password is rotated — delete this
        # `if:` line to re-enable.
        if: ${{ false }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID" ]; then
            echo "APPLE_ID secret not set; skipping notarization."
            exit 0
          fi
          {
            echo "APPLE_ID=$APPLE_ID"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
          } >> "$GITHUB_ENV"

      - name: Wrap Tauri CLI for CI diagnostics
        shell: bash
        run: |
          cat > tauri-ci <<'EOF'
          #!/usr/bin/env bash
          set -o pipefail
          log="${RUNNER_TEMP:-.}/tauri-build.log"
          npm run tauri -- "$@" 2>&1 | tee "$log"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            python3 - "$log" <<'PY'
          import pathlib
          import sys

          lines = pathlib.Path(sys.argv[1]).read_text(errors="replace").splitlines()
          msg = "\n".join(lines[-80:])
          msg = msg.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error title=Tauri build failed::{msg}")
          PY
          fi
          exit "$status"
          EOF
          chmod +x tauri-ci

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: v__VERSION__
          releaseName: "Charon v__VERSION__"
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          tauriScript: ./tauri-ci
          args: --target universal-apple-darwin

      - name: Tag commit on successful publish (tag-after-build)
        shell: bash
        run: |
          set -euo pipefail
          APP_VER=$(node -p "require('./src-tauri/tauri.conf.json').version")
          TAG="v${APP_VER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # tauri-action publishes the release (and therefore the tag) via the
          # GitHub API during the build, so the remote may already have this
          # tag even though this checkout (taken before the build) doesn't.
          # A local-only `git tag -l` check misses that and tries to push a
          # fresh tag, which the remote rejects with "(already exists)".
          # Probe the remote instead — if the tag is there, tauri-action already
          # did the work; otherwise we tag the built commit now that publish
          # succeeded (failed builds never leave an orphaned tag).
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists on origin; nothing to do."
            exit 0
          fi
          git tag "$TAG" HEAD
          git push origin "$TAG"
