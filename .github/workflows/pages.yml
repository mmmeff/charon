# Marketing site → GitHub Pages (https://mmmeff.github.io/charon/).
# The site is a single static page in site/; screenshots live in docs/ and are
# copied into the artifact here rather than committed twice.

name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site/assets
          cp -r site/. _site/
          rm -rf _site/assets && mkdir -p _site/assets
          cp docs/*.png docs/tour.gif app-icon.svg _site/assets/

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
