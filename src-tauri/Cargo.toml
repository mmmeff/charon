[package]
name = "pr-copilot"
version = "0.1.0"
description = "PR Copilot — human-in-the-loop GitHub PR agent desktop app"
edition = "2021"

[lib]
name = "pr_copilot_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-notification = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "gzip"] }
urlencoding = "2"

[profile.dev]
incremental = true
