<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Charon app icon — the moon Charon with its dusty red polar cap">
  <defs>
    <!-- tile depth -->
    <radialGradient id="tile" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#17160f"/>
      <stop offset="100%" stop-color="#0c0b08"/>
    </radialGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1.6" cy="1.6" r="1.6" fill="#e9e4d4" opacity="0.05"/>
    </pattern>
    <!-- ember rising from the bottom edge -->
    <linearGradient id="ember" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff4f00" stop-opacity="0.06"/>
      <stop offset="40%" stop-color="#ff4f00" stop-opacity="0"/>
    </linearGradient>
    <!-- sphere: sunlit from upper left, falling to a dark limb -->
    <radialGradient id="moon" cx="40%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#ece7da"/>
      <stop offset="45%" stop-color="#cfc9ba"/>
      <stop offset="78%" stop-color="#a59e8f"/>
      <stop offset="100%" stop-color="#736d60"/>
    </radialGradient>
    <!-- terminator shadow creeping over the lower-right limb -->
    <radialGradient id="limb" cx="38%" cy="34%" r="80%">
      <stop offset="70%" stop-color="#0c0b08" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0c0b08" stop-opacity="0.5"/>
    </radialGradient>
    <!-- dusty cap: dense rust core fading into the regolith -->
    <radialGradient id="cap" cx="50%" cy="18%" r="85%">
      <stop offset="0%" stop-color="#9c4a22"/>
      <stop offset="55%" stop-color="#a35427" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a35427" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="tileClip">
      <rect x="100" y="100" width="824" height="824" rx="188"/>
    </clipPath>
    <clipPath id="moonClip">
      <circle cx="512" cy="500" r="278"/>
    </clipPath>
  </defs>

  <!-- rounded tile (transparent margin = macOS squircle) -->
  <g clip-path="url(#tileClip)">
    <rect x="100" y="100" width="824" height="824" fill="url(#tile)"/>
    <rect x="100" y="100" width="824" height="824" fill="url(#dots)"/>
    <rect x="100" y="100" width="824" height="824" fill="url(#ember)"/>
  </g>
  <rect x="100" y="100" width="824" height="824" rx="188" fill="none" stroke="#2e2b21" stroke-width="4"/>
  <!-- bracket corners (spec-card motif) -->
  <g fill="none" stroke="#ff4f00" stroke-width="7" opacity="0.9">
    <path d="M196 150 H150 V196"/>
    <path d="M828 874 H874 V828"/>
  </g>

  <!-- the moon -->
  <circle cx="512" cy="500" r="278" fill="url(#moon)"/>
  <g clip-path="url(#moonClip)">
    <!-- Mordor Macula: layered dusty blobs, diffuse at the edges -->
    <ellipse cx="540" cy="248" rx="252" ry="148" fill="url(#cap)"/>
    <ellipse cx="556" cy="220" rx="170" ry="92" fill="#94431f" opacity="0.55"/>
    <ellipse cx="588" cy="200" rx="104" ry="58" fill="#8a3a1a" opacity="0.5"/>
    <ellipse cx="470" cy="240" rx="70" ry="36" fill="#a85b2d" opacity="0.35"/>

    <!-- equatorial chasm belt: the tectonic scar across the face -->
    <g fill="none" stroke="#5d5749" stroke-linecap="round">
      <path d="M250 542 q70 -28 132 -10 t118 26 q66 18 130 -8 t140 -44" stroke-width="13" opacity="0.55"/>
      <path d="M262 560 q66 -16 124 0 t112 24 q70 18 136 -10" stroke-width="6" opacity="0.4"/>
      <path d="M448 540 q22 34 8 78" stroke-width="6" opacity="0.35"/>
      <path d="M634 540 q-12 40 6 86" stroke-width="6" opacity="0.3"/>
    </g>
    <!-- canyon highlight rim (sun catching the north wall) -->
    <path d="M256 532 q70 -28 130 -12 t118 26 q66 18 130 -8 t136 -42" fill="none" stroke="#efeadc" stroke-width="5" opacity="0.5" stroke-linecap="round"/>

    <!-- craters: bowl shadow offset from a lit rim -->
    <g>
      <circle cx="392" cy="676" r="34" fill="#3f3a30" opacity="0.32"/>
      <circle cx="386" cy="670" r="34" fill="none" stroke="#e8e3d5" stroke-width="5" opacity="0.45"/>
      <circle cx="610" cy="640" r="22" fill="#3f3a30" opacity="0.3"/>
      <circle cx="606" cy="636" r="22" fill="none" stroke="#e8e3d5" stroke-width="4" opacity="0.4"/>
      <circle cx="520" cy="730" r="15" fill="#3f3a30" opacity="0.28"/>
      <circle cx="517" cy="727" r="15" fill="none" stroke="#e8e3d5" stroke-width="3.5" opacity="0.38"/>
      <circle cx="330" cy="430" r="18" fill="#3f3a30" opacity="0.24"/>
      <circle cx="327" cy="427" r="18" fill="none" stroke="#eee9db" stroke-width="4" opacity="0.4"/>
      <circle cx="688" cy="452" r="13" fill="#3f3a30" opacity="0.25"/>
      <circle cx="685" cy="449" r="13" fill="none" stroke="#eee9db" stroke-width="3" opacity="0.35"/>
      <circle cx="438" cy="368" r="10" fill="#3f3a30" opacity="0.22"/>
      <circle cx="700" cy="700" r="26" fill="#3f3a30" opacity="0.26"/>
      <circle cx="695" cy="695" r="26" fill="none" stroke="#e8e3d5" stroke-width="4" opacity="0.3"/>
    </g>

    <!-- terminator -->
    <circle cx="512" cy="500" r="278" fill="url(#limb)"/>
  </g>
  <!-- limb line -->
  <circle cx="512" cy="500" r="278" fill="none" stroke="#0c0b08" stroke-width="5" opacity="0.6"/>
</svg>
