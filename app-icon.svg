<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Charon app icon — the ferryman's obol">
  <defs>
    <!-- tile depth -->
    <radialGradient id="tile" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#17160f"/>
      <stop offset="100%" stop-color="#0c0b08"/>
    </radialGradient>
    <!-- coin sheen: struck-metal highlight top-left -->
    <radialGradient id="coin" cx="38%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#ff6a26"/>
      <stop offset="55%" stop-color="#ff4f00"/>
      <stop offset="100%" stop-color="#d83f00"/>
    </radialGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1.6" cy="1.6" r="1.6" fill="#e9e4d4" opacity="0.05"/>
    </pattern>
    <!-- ember rising from the bottom edge, smoothly -->
    <linearGradient id="ember" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff4f00" stop-opacity="0.14"/>
      <stop offset="45%" stop-color="#ff4f00" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="tileClip">
      <rect x="100" y="100" width="824" height="824" rx="188"/>
    </clipPath>
    <!-- the engraving: ferry + pole + lantern, cut from the coin face -->
    <mask id="engrave">
      <rect x="0" y="0" width="1024" height="1024" fill="#fff"/>
      <g fill="#000" stroke="#000">
        <!-- black water: two ripple chords under the hull -->
        <g stroke-width="13" stroke-linecap="round" fill="none">
          <path d="M372 648 q34 -22 68 0 t68 0 t68 0 t68 0"/>
          <path d="M398 690 q30 -18 60 0 t60 0 t60 0"/>
        </g>
        <!-- ferry hull: a shallow crescent skiff -->
        <path d="M352 588 Q512 700 672 588 Q566 636 458 636 Q400 636 352 588 Z"/>
        <!-- punt pole, raked -->
        <rect x="556" y="356" width="15" height="232" transform="rotate(11 563 472)"/>
        <!-- the ferryman: a hooded standing figure at the stern -->
        <path d="M470 590 L470 470 Q470 432 502 432 Q534 432 534 470 L534 590 Z"/>
        <circle cx="502" cy="424" r="26"/>
      </g>
    </mask>
  </defs>

  <!-- rounded tile (transparent margin = macOS squircle) -->
  <g clip-path="url(#tileClip)">
    <rect x="100" y="100" width="824" height="824" fill="url(#tile)"/>
    <rect x="100" y="100" width="824" height="824" fill="url(#dots)"/>
    <!-- ember glow rising from the lower edge -->
    <rect x="100" y="100" width="824" height="824" fill="url(#ember)"/>
  </g>
  <rect x="100" y="100" width="824" height="824" rx="188" fill="none" stroke="#2e2b21" stroke-width="4"/>
  <!-- bracket corners (spec-card motif) -->
  <g fill="none" stroke="#ff4f00" stroke-width="7" opacity="0.9">
    <path d="M196 150 H150 V196"/>
    <path d="M828 874 H874 V828"/>
  </g>

  <!-- the obol -->
  <circle cx="512" cy="512" r="232" fill="url(#coin)" mask="url(#engrave)"/>
  <!-- milled edge -->
  <circle cx="512" cy="512" r="232" fill="none" stroke="#0c0b08" stroke-width="14" stroke-dasharray="5 17"/>
  <circle cx="512" cy="512" r="223" fill="none" stroke="#0c0b08" stroke-width="4" opacity="0.55"/>

  <!-- ghost-light lantern atop the pole: the one spark of acid -->
  <g transform="translate(519,352)">
    <circle r="26" fill="#cff24d" opacity="0.18"/>
    <path d="M0 -15 L13 0 L0 15 L-13 0 Z" fill="#cff24d"/>
  </g>
</svg>
